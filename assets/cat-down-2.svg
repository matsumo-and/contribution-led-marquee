<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <rect x="10" y="11" width="4" height="4" fill="#1A1A1A"/>
  <rect x="11" y="10" width="2" height="1" fill="#1A1A1A"/>

  <!-- Ears (outer shape) -->
  <rect x="10" y="10" width="1" height="1" fill="#1A1A1A"/>
  <rect x="13" y="10" width="1" height="1" fill="#1A1A1A"/>
  <rect x="10" y="9" width="1" height="1" fill="#1A1A1A"/>
  <rect x="13" y="9" width="1" height="1" fill="#1A1A1A"/>

  <!-- Ears (inner color - pinkish) -->
  <rect x="10" y="10" width="1" height="1" fill="#3A2A2A" opacity="0.6"/>
  <rect x="13" y="10" width="1" height="1" fill="#3A2A2A" opacity="0.6"/>

  <!-- Eyes -->
  <rect x="11" y="12" width="1" height="1" fill="#FFD700"/>
  <rect x="12" y="12" width="1" height="1" fill="#FFD700"/>

  <!-- Whiskers (left side) -->
  <rect x="8" y="12" width="2" height="1" fill="#4A4A4A" opacity="0.4"/>
  <rect x="8" y="13" width="2" height="1" fill="#4A4A4A" opacity="0.3"/>
  <rect x="8" y="14" width="1" height="1" fill="#4A4A4A" opacity="0.4"/>

  <!-- Whiskers (right side) -->
  <rect x="14" y="12" width="2" height="1" fill="#4A4A4A" opacity="0.4"/>
  <rect x="14" y="13" width="2" height="1" fill="#4A4A4A" opacity="0.3"/>
  <rect x="15" y="14" width="1" height="1" fill="#4A4A4A" opacity="0.4"/>

  <!-- Body -->
  <rect x="10" y="14" width="4" height="4" fill="#1A1A1A"/>
  <rect x="9" y="15" width="1" height="2" fill="#1A1A1A"/>
  <rect x="14" y="15" width="1" height="2" fill="#1A1A1A"/>

  <!-- Body shadow (bottom-right) -->
  <rect x="13" y="17" width="1" height="1" fill="#0D0D0D"/>

  <!-- Body highlight (top-left) -->
  <rect x="10" y="14" width="1" height="1" fill="#2A2A2A" opacity="0.3"/>

  <!-- Tail (at back, curved right - Frame 2) -->
  <rect x="11" y="18" width="2" height="1" fill="#1A1A1A"/>
  <rect x="10" y="19" width="1" height="1" fill="#1A1A1A"/>
  <rect x="13" y="19" width="1" height="1" fill="#1A1A1A"/>
  <rect x="10" y="20" width="1" height="1" fill="#1A1A1A"/>
  <rect x="14" y="20" width="1" height="1" fill="#1A1A1A"/>

  <!-- Legs (Frame 2: right legs forward - shifted position) -->
  <rect x="11" y="18" width="1" height="2" fill="#1A1A1A"/>
  <rect x="12" y="18" width="1" height="2" fill="#1A1A1A"/>

  <!-- Paw pads (visible on extended paws) -->
  <rect x="11" y="19" width="1" height="1" fill="#2D1F1F" opacity="0.5"/>
  <rect x="12" y="19" width="1" height="1" fill="#2D1F1F" opacity="0.5"/>
</svg>
