<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Tail (at front when facing away, curved right - Frame 2) -->
  <rect x="11" y="17" width="2" height="2" fill="#1A1A1A"/>
  <rect x="10" y="19" width="1" height="1" fill="#1A1A1A"/>
  <rect x="13" y="19" width="1" height="1" fill="#1A1A1A"/>
  <rect x="14" y="20" width="1" height="1" fill="#1A1A1A"/>

  <!-- Body -->
  <rect x="10" y="13" width="4" height="5" fill="#1A1A1A"/>
  <rect x="9" y="14" width="1" height="3" fill="#1A1A1A"/>
  <rect x="14" y="14" width="1" height="3" fill="#1A1A1A"/>

  <!-- Body shadow (bottom side) -->
  <rect x="13" y="17" width="1" height="1" fill="#0D0D0D"/>

  <!-- Body highlight (top) -->
  <rect x="10" y="13" width="1" height="1" fill="#2A2A2A" opacity="0.3"/>

  <!-- Head -->
  <rect x="10" y="10" width="4" height="4" fill="#1A1A1A"/>
  <rect x="11" y="9" width="2" height="1" fill="#1A1A1A"/>

  <!-- Ears (back view) -->
  <rect x="10" y="9" width="1" height="1" fill="#1A1A1A"/>
  <rect x="13" y="9" width="1" height="1" fill="#1A1A1A"/>
  <rect x="10" y="8" width="1" height="1" fill="#1A1A1A"/>
  <rect x="13" y="8" width="1" height="1" fill="#1A1A1A"/>

  <!-- Ear inner (darker from behind) -->
  <rect x="10" y="9" width="1" height="1" fill="#0D0D0D" opacity="0.4"/>
  <rect x="13" y="9" width="1" height="1" fill="#0D0D0D" opacity="0.4"/>

  <!-- Eyes (barely visible from behind - just hints) -->
  <rect x="11" y="11" width="1" height="1" fill="#FFD700" opacity="0.2"/>
  <rect x="12" y="11" width="1" height="1" fill="#FFD700" opacity="0.2"/>

  <!-- Legs (Frame 2: right legs forward) -->
  <rect x="11" y="18" width="1" height="2" fill="#1A1A1A"/>
  <rect x="12" y="18" width="1" height="2" fill="#1A1A1A"/>

  <!-- Paw pads -->
  <rect x="11" y="19" width="1" height="1" fill="#2D1F1F" opacity="0.5"/>
  <rect x="12" y="19" width="1" height="1" fill="#2D1F1F" opacity="0.5"/>
</svg>
