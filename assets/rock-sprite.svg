<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <g id="rockSprite">
    <!-- Deep shadow (left and bottom) -->
    <rect x="5" y="19" width="3" height="2" fill="#3A3A3A"/>
    <rect x="8" y="19" width="6" height="2" fill="#4A4A4A"/>
    <rect x="14" y="19" width="3" height="2" fill="#5A5A5A"/>
    <rect x="6" y="18" width="2" height="1" fill="#4A4A4A"/>
    <rect x="13" y="18" width="3" height="1" fill="#5A5A5A"/>

    <!-- Dark bottom layer (irregular) -->
    <rect x="5" y="16" width="3" height="3" fill="#5A5A5A"/>
    <rect x="8" y="17" width="4" height="2" fill="#6A6A6A"/>
    <rect x="12" y="16" width="5" height="3" fill="#6A6A6A"/>
    <rect x="4" y="17" width="1" height="1" fill="#5A5A5A"/>
    <rect x="17" y="17" width="1" height="1" fill="#6A6A6A"/>

    <!-- Lower-mid dark layer (left shadow area) -->
    <rect x="4" y="13" width="3" height="4" fill="#6A6A6A"/>
    <rect x="7" y="14" width="3" height="4" fill="#7A7A7A"/>
    <rect x="10" y="15" width="2" height="3" fill="#8A8A8A"/>
    <rect x="12" y="14" width="4" height="3" fill="#8A8A8A"/>
    <rect x="16" y="15" width="2" height="3" fill="#7A7A7A"/>

    <!-- Mid layer (main body, mixed tones) -->
    <rect x="5" y="11" width="3" height="3" fill="#7A7A7A"/>
    <rect x="8" y="12" width="3" height="3" fill="#9A9A9A"/>
    <rect x="11" y="11" width="3" height="4" fill="#AAAAAA"/>
    <rect x="14" y="12" width="3" height="3" fill="#8A8A8A"/>
    <rect x="17" y="13" width="1" height="2" fill="#7A7A7A"/>

    <!-- Upper-mid layer (complex surface) -->
    <rect x="6" y="9" width="3" height="3" fill="#8A8A8A"/>
    <rect x="9" y="9" width="2" height="4" fill="#AAAAAA"/>
    <rect x="11" y="8" width="3" height="4" fill="#BABABA"/>
    <rect x="14" y="9" width="3" height="4" fill="#9A9A9A"/>
    <rect x="17" y="11" width="1" height="2" fill="#8A8A8A"/>

    <!-- Top layer (irregular peaks) -->
    <rect x="7" y="7" width="2" height="3" fill="#9A9A9A"/>
    <rect x="9" y="7" width="3" height="3" fill="#BABABA"/>
    <rect x="12" y="6" width="3" height="3" fill="#CACACA"/>
    <rect x="15" y="7" width="2" height="3" fill="#AAAAAA"/>
    <rect x="10" y="6" width="2" height="1" fill="#C0C0C0"/>
    <rect x="14" y="6" width="1" height="1" fill="#B0B0B0"/>

    <!-- Bright highlights (top right areas) -->
    <rect x="12" y="7" width="2" height="2" fill="#D8D8D8"/>
    <rect x="13" y="6" width="1" height="1" fill="#E0E0E0"/>
    <rect x="11" y="8" width="2" height="2" fill="#D0D0D0"/>
    <rect x="14" y="8" width="1" height="1" fill="#E8E8E8"/>

    <!-- Very bright spots (highlights) -->
    <rect x="13" y="7" width="1" height="1" fill="#F0F0F0"/>
    <rect x="12" y="8" width="1" height="1" fill="#E8E8E8"/>

    <!-- Dark texture spots (surface detail) -->
    <rect x="8" y="10" width="1" height="1" fill="#7A7A7A"/>
    <rect x="10" y="12" width="1" height="1" fill="#8A8A8A"/>
    <rect x="13" y="11" width="1" height="1" fill="#9A9A9A"/>
    <rect x="15" y="13" width="1" height="1" fill="#7A7A7A"/>
    <rect x="7" y="14" width="1" height="1" fill="#6A6A6A"/>
    <rect x="11" y="15" width="1" height="1" fill="#7A7A7A"/>
    <rect x="14" y="16" width="1" height="1" fill="#6A6A6A"/>

    <!-- Light texture spots (bumps) -->
    <rect x="9" y="11" width="1" height="1" fill="#C0C0C0"/>
    <rect x="11" y="10" width="1" height="1" fill="#C8C8C8"/>
    <rect x="15" y="11" width="1" height="1" fill="#B0B0B0"/>
    <rect x="10" y="14" width="1" height="1" fill="#A0A0A0"/>
  </g>
</svg>
