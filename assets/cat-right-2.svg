<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Tail (curved up and back, slightly different position) -->
  <rect x="7" y="9" width="1" height="1" fill="#1A1A1A"/>
  <rect x="6" y="8" width="1" height="1" fill="#1A1A1A"/>
  <rect x="5" y="7" width="1" height="1" fill="#1A1A1A"/>
  <rect x="4" y="6" width="1" height="1" fill="#1A1A1A"/>
  <rect x="4" y="5" width="1" height="1" fill="#1A1A1A"/>

  <!-- Body -->
  <rect x="7" y="11" width="8" height="4" fill="#1A1A1A"/>
  <rect x="8" y="10" width="6" height="1" fill="#1A1A1A"/>

  <!-- Body shadow -->
  <rect x="7" y="14" width="2" height="1" fill="#0D0D0D"/>

  <!-- Body highlight -->
  <rect x="12" y="10" width="2" height="1" fill="#2A2A2A" opacity="0.3"/>

  <!-- Head -->
  <rect x="14" y="10" width="6" height="5" fill="#1A1A1A"/>
  <rect x="15" y="9" width="4" height="1" fill="#1A1A1A"/>

  <!-- Ears -->
  <rect x="18" y="8" width="1" height="1" fill="#1A1A1A"/>
  <rect x="15" y="8" width="1" height="1" fill="#1A1A1A"/>
  <rect x="16" y="7" width="1" height="1" fill="#1A1A1A"/>
  <rect x="17" y="7" width="1" height="1" fill="#1A1A1A"/>

  <!-- Ear inner -->
  <rect x="16" y="8" width="1" height="1" fill="#3A2A2A" opacity="0.6"/>
  <rect x="17" y="8" width="1" height="1" fill="#3A2A2A" opacity="0.6"/>

  <!-- Eye -->
  <rect x="16" y="11" width="2" height="2" fill="#FFD700"/>
  <rect x="16" y="12" width="1" height="1" fill="#1A1A1A"/>

  <!-- Nose -->
  <rect x="19" y="12" width="1" height="1" fill="#1A1A1A"/>

  <!-- Whiskers -->
  <rect x="20" y="11" width="2" height="1" fill="#4A4A4A" opacity="0.4"/>
  <rect x="20" y="12" width="3" height="1" fill="#4A4A4A" opacity="0.3"/>
  <rect x="20" y="13" width="2" height="1" fill="#4A4A4A" opacity="0.4"/>

  <!-- Legs (Frame 2: front right back, back right forward) -->
  <rect x="12" y="15" width="2" height="2" fill="#1A1A1A"/>
  <rect x="7" y="15" width="2" height="3" fill="#1A1A1A"/>

  <!-- Paws -->
  <rect x="12" y="17" width="2" height="1" fill="#0D0D0D"/>
  <rect x="7" y="18" width="2" height="1" fill="#0D0D0D"/>

  <!-- Paw pads (visible on extended leg) -->
  <rect x="7" y="17" width="2" height="1" fill="#2D1F1F" opacity="0.5"/>
</svg>
