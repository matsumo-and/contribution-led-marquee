name: 'Git Marquee'
description: 'Generate a scrolling LED marquee visualization of your GitHub contributions'
author: 'Your Name'

branding:
  icon: 'zap'
  color: 'green'

inputs:
  github_user_name:
    description: 'GitHub username to fetch contributions for'
    required: true
  text:
    description: 'Text to display in the LED marquee'
    required: true
  show_contributions:
    description: 'Show contribution graph before text (default: true)'
    required: false
    default: 'true'
  output_path:
    description: 'Path where the SVG file will be saved'
    required: false
    default: 'dist/marquee.svg'

outputs:
  svg_path:
    description: 'Path to the generated SVG file'

runs:
  using: 'node24'
  main: 'dist/index.js'
