name: 'Git Marquee'
description: 'Generate a scrolling LED marquee visualization of your GitHub contributions'
author: 'Your Name'

branding:
  icon: 'zap'
  color: 'green'

inputs:
  github_user_name:
    description: 'GitHub username to fetch contributions for'
    required: true
  text:
    description: 'Text to display in the LED marquee'
    required: true
  show_contributions:
    description: 'Show contribution graph before text (default: true)'
    required: false
    default: true
  cell_size:
    description: 'Size of each cell in pixels (default: 10)'
    required: false
    default: '10'
  cell_gap:
    description: 'Gap between cells in pixels (default: 2)'
    required: false
    default: '2'
  scroll_speed:
    description: 'Scroll speed in columns per second (default: 4)'
    required: false
    default: '4'
  initial_delay:
    description: 'Seconds before graph disappears (default: 3)'
    required: false
    default: '3'
  output_path:
    description: 'Path where the SVG file will be saved'
    required: false
    default: 'dist/marquee.svg'

outputs:
  svg_path:
    description: 'Path to the generated SVG file'

runs:
  using: 'node24'
  main: 'dist/index.js'
