name: 'Cat RPG Contribution Visualizer'
description: 'Generate a pixel RPG visualization of your GitHub contributions with a cat character'
author: 'Your Name'

branding:
  icon: 'map'
  color: 'green'

inputs:
  github_user_name:
    description: 'GitHub username to fetch contributions for'
    required: true
  output_path:
    description: 'Path where the SVG file will be saved'
    required: false
    default: 'dist/cat-rpg.svg'
  animate:
    description: 'Whether to animate the cat movement'
    required: false
    default: 'true'

outputs:
  svg_path:
    description: 'Path to the generated SVG file'

runs:
  using: 'node20'
  main: 'dist/index.js'