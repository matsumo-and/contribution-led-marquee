name: Generate Git Marquee

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate Marquee
        run: |
          export INPUT_GITHUB_USER_NAME="${{ github.repository_owner }}"
          export INPUT_TEXT="HELLO FROM GITHUB ACTIONS"
          export INPUT_OUTPUT_PATH="dist/marquee.svg"
          node dist/index.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/marquee.svg dist/contribution-graph.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update marquee [skip ci]" && git push)
